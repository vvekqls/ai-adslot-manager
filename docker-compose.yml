version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-adslot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adslot
      POSTGRES_PASSWORD: adslot
      POSTGRES_DB: adslot
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-adslot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: ai-adslot-backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://adslot:adslot@postgres:5432/adslot?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NODE_ENV: development
    ports:
      - '4000:4000'
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: ai-adslot-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres-data:
