name: CI

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: adslot
          POSTGRES_PASSWORD: adslot
          POSTGRES_DB: adslot
        options: >-
          --health-cmd "pg_isready -U adslot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://adslot:adslot@localhost:5432/adslot?schema=public
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Prisma generate
        run: npm run prisma:generate --workspace backend
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
